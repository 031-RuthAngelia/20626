appId: com.jipraks.kasirgratisan
productName: FreeKasir
directories:
  buildResources: resources
  output: release/${version}
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: dist/kasirgratisan-icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: FreeKasir
